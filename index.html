

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cooper Supply Co — Prototype</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter",
          sans-serif;
        background: #050505;
        color: #f5f5f5;
        overflow-x: hidden;
      }
      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 32px;
        border-bottom: 1px solid #222;
        position: sticky;
        top: 0;
        background: rgba(5, 5, 5, 0.9);
        backdrop-filter: blur(10px);
        z-index: 10;
      }
      .nav-left {
        font-weight: 800;
        letter-spacing: 0.12em;
        font-size: 14px;
        text-transform: uppercase;
      }
      .nav-right {
        display: flex;
        gap: 24px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .nav-right span {
        cursor: pointer;
        opacity: 0.7;
      }
      .nav-right span:hover {
        opacity: 1;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.1fr);
        padding: 64px 8vw 80px;
        gap: 40px;
        align-items: center;
      }
      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
          padding-top: 32px;
        }
      }
      .hero-left {
        position: relative;
      }
      .hero-tag {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: #a0a0a0;
        margin-bottom: 12px;
      }
      .hero-title {
        font-size: clamp(32px, 5vw, 52px);
        font-weight: 800;
        line-height: 1.05;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 16px;
      }
      .hero-sub {
        font-size: 14px;
        max-width: 360px;
        color: #c0c0c0;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .hero-ctas {
        display: flex;
        gap: 12px;
        margin-bottom: 24px;
      }
      .btn {
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid #f5f5f5;
        background: #f5f5f5;
        color: #050505;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease,
          background 0.15s ease, color 0.15s ease;
      }
      .btn.secondary {
        background: transparent;
        color: #f5f5f5;
        border-color: #555;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      }
      .hero-meta {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #777;
      }

      .mascot-placeholder {
        margin-top: 24px;
        width: 120px;
        height: 120px;
        border-radius: 999px;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #999;
      }

      .hero-right {
        height: 420px;
        max-height: 60vh;
        border-radius: 24px;
        border: 1px solid #222;
        background: radial-gradient(circle at top, #202020, #050505);
        overflow: hidden;
        position: relative;
      }

      .canvas-wrapper {
        width: 100%;
        height: 100%;
      }

      .footer {
        padding: 32px 8vw 40px;
        border-top: 1px solid #222;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #777;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      @media (max-width: 700px) {
        .footer {
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React + ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- React Three Fiber + Drei -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@react-three/fiber@8.15.10/dist/react-three-fiber.umd.js"></script>
    <script src="https://unpkg.com/@react-three/drei@9.121.3/dist/drei.umd.js"></script>

    <!-- GSAP -->
    <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>

    <script type="text/javascript">
      const { useState, useRef, useEffect } = React;
      const { createRoot } = ReactDOM;
      const { Canvas, useFrame } = ReactThreeFiber;
      const { OrbitControls } = drei;

      // --- Simple wheel items data ---
      const wheelItems = [
        { id: "hat", label: "Hat" },
        { id: "hoodie", label: "Hoodie" },
        { id: "tee", label: "Tee" },
        { id: "bag", label: "Bag" },
        { id: "crew", label: "Crew" },
        { id: "accessory", label: "Acc." }
      ];

      // --- WheelItem: simple plane with label ---
      function WheelItem({ index, total, radius = 3, active }) {
        const groupRef = useRef();
        const angle = (index / total) * Math.PI * 2;

        useFrame(() => {
          if (groupRef.current) {
            groupRef.current.rotation.y += 0.0;
          }
        });

        return React.createElement(
          "group",
          {
            ref: groupRef,
            position: [
              Math.cos(angle) * radius,
              0,
              Math.sin(angle) * radius
            ],
            rotation: [0, -angle + Math.PI / 2, 0]
          },
          React.createElement(
            "mesh",
            null,
            React.createElement("circleGeometry", { args: [0.7, 32] }),
            React.createElement("meshStandardMaterial", {
              color: active ? "#ffffff" : "#f5f5f5",
              emissive: active ? "#ffffff" : "#000000",
              emissiveIntensity: active ? 0.4 : 0.0
            })
          ),
          React.createElement(
            "mesh",
            { position: [0, 0, 0.01] },
            React.createElement("planeGeometry", { args: [1.4, 0.4] }),
            React.createElement("meshBasicMaterial", {
              transparent: true,
              opacity: 0
            })
          )
        );
      }

      // --- Wheel core ---
      function Wheel() {
        const groupRef = useRef();
        const [isDragging, setIsDragging] = useState(false);
        const [lastX, setLastX] = useState(0);
        const [velocity, setVelocity] = useState(0);
        const [activeIndex, setActiveIndex] = useState(0);

        useFrame(() => {
          if (!groupRef.current) return;
          groupRef.current.rotation.y += velocity || 0.002;
          setVelocity((v) => v * 0.96);
        });

        const onPointerDown = (e) => {
          setIsDragging(true);
          setLastX(e.clientX);
        };

        const onPointerMove = (e) => {
          if (!isDragging || !groupRef.current) return;
          const deltaX = e.clientX - lastX;
          setLastX(e.clientX);
          const rotSpeed = deltaX * 0.002;
          groupRef.current.rotation.y += rotSpeed;
          setVelocity(rotSpeed);
        };

        const onPointerUp = () => {
          setIsDragging(false);
        };

        useEffect(() => {
          const handleUp = () => setIsDragging(false);
          window.addEventListener("pointerup", handleUp);
          return () => window.removeEventListener("pointerup", handleUp);
        }, []);

        return React.createElement(
          "group",
          {
            ref: groupRef,
            onPointerDown,
            onPointerMove,
            onPointerUp
          },
          wheelItems.map((item, i) =>
            React.createElement(WheelItem, {
              key: item.id,
              index: i,
              total: wheelItems.length,
              active: i === activeIndex
            })
          )
        );
      }

      // --- Lighting ---
      function Lighting() {
        return React.createElement(
          React.Fragment,
          null,
          React.createElement("ambientLight", { intensity: 0.4 }),
          React.createElement("directionalLight", {
            position: [4, 6, 4],
            intensity: 1.2
          }),
          React.createElement("directionalLight", {
            position: [-4, 3, -4],
            intensity: 0.6,
            color: "#88aaff"
          })
        );
      }

      // --- Scene wrapper ---
      function WheelScene() {
        return React.createElement(
          React.Fragment,
          null,
          React.createElement(Lighting, null),
          React.createElement(
            "group",
            { position: [0, 0, 0] },
            React.createElement(Wheel, null)
          )
        );
      }

      // --- Canvas wrapper ---
      function WheelCanvas() {
        return React.createElement(
          Canvas,
          {
            camera: { position: [0, 4, 8], fov: 45 },
            shadows: true
          },
          React.createElement(WheelScene, null),
          React.createElement(OrbitControls, {
            enableZoom: false,
            enablePan: false,
            enableRotate: false
          })
        );
      }

      // --- Main App ---
      function App() {
        const heroRef = useRef(null);
        const titleRef = useRef(null);
        const subRef = useRef(null);
        const ctasRef = useRef(null);

        useEffect(() => {
          const tl = gsap.timeline();
          tl.from(heroRef.current, {
            opacity: 0,
            duration: 0.6,
            ease: "power2.out"
          })
            .from(
              titleRef.current,
              {
                y: 30,
                opacity: 0,
                duration: 0.5,
                ease: "power3.out"
              },
              "-=0.3"
            )
            .from(
              subRef.current,
              {
                y: 20,
                opacity: 0,
                duration: 0.4,
                ease: "power2.out"
              },
              "-=0.25"
            )
            .from(
              ctasRef.current,
              {
                y: 20,
                opacity: 0,
                duration: 0.4,
                ease: "power2.out"
              },
              "-=0.3"
            );
        }, []);

        return React.createElement(
          "div",
          { className: "page" },
          React.createElement(
            "header",
            { className: "nav" },
            React.createElement(
              "div",
              { className: "nav-left" },
              "COOPER SUPPLY CO."
            ),
            React.createElement(
              "div",
              { className: "nav-right" },
              React.createElement("span", null, "Shop"),
              React.createElement("span", null, "Drops"),
              React.createElement("span", null, "Collections"),
              React.createElement("span", null, "Lookbook")
            )
          ),
          React.createElement(
            "main",
            null,
            React.createElement(
              "section",
              { className: "hero", ref: heroRef },
              React.createElement(
                "div",
                { className: "hero-left" },
                React.createElement(
                  "div",
                  { className: "hero-tag" },
                  "Drop 01 \u2014 The Cooper Classics"
                ),
                React.createElement(
                  "h1",
                  { className: "hero-title", ref: titleRef },
                  "Streetwear Built for Movement."
                ),
                React.createElement(
                  "p",
                  { className: "hero-sub", ref: subRef },
                  "Cooper Supply Company blends vintage mascot energy with modern streetwear silhouettes. Limited runs. No restocks."
                ),
                React.createElement(
                  "div",
                  { className: "hero-ctas", ref: ctasRef },
                  React.createElement(
                    "button",
                    { className: "btn" },
                    "Shop Drop"
                  ),
                  React.createElement(
                    "button",
                    { className: "btn secondary" },
                    "View Lookbook"
                  )
                ),
                React.createElement(
                  "div",
                  { className: "hero-meta" },
                  "Cooper Supply Co. \u00b7 Orlando, FL"
                ),
                React.createElement(
                  "div",
                  { className: "mascot-placeholder" },
                  "Mascot Here"
                )
              ),
              React.createElement(
                "div",
                { className: "hero-right" },
                React.createElement(
                  "div",
                  { className: "canvas-wrapper" },
                  React.createElement(WheelCanvas, null)
                )
              )
            )
          ),
          React.createElement(
            "footer",
            { className: "footer" },
            React.createElement(
              "div",
              null,
              "Stay Moving \u00b7 Cooper Supply Company"
            ),
            React.createElement("div", null, "2026 \u00b7 All Rights Reserved")
          )
        );
      }

      const root = createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    </script>
  </body>
</html>
